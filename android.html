<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a1f">
<title>KidShield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,600;8..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/common.css">
<link rel="stylesheet" href="assets/css/android.css">
</head>
<body data-platform="android">

<div id="app">
  <!-- Status Bar -->
  <div class="statusbar">
    <span id="sb-time">9:41</span>
    <span>●●● 📶 100%</span>
  </div>

  <!-- Pages -->
  <div id="p-home" class="page on"></div>
  <div id="p-devices" class="page"></div>
  <div id="p-alerts" class="page"></div>
  <div id="p-more" class="page"></div>
  <div id="p-apps" class="page"></div>
  <div id="p-schedule" class="page"></div>
  <div id="p-ai" class="page"></div>
  <div id="p-rewards" class="page"></div>
  <div id="p-geo" class="page"></div>
  <div id="p-reports" class="page"></div>
  <div id="p-notify" class="page"></div>
  <div id="p-link" class="page"></div>
  <div id="p-settings" class="page"></div>

  <!-- FAB SOS -->
  <button class="fab" onclick="doSOS()">🆘</button>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-item on" data-tab="home" onclick="go('home')"><div class="nav-icon-pill">⬡</div><div class="nav-label">Tổng quan</div></button>
    <button class="nav-item" data-tab="devices" onclick="go('devices')"><div class="nav-icon-pill">📡</div><div class="nav-label">Thiết bị</div></button>
    <button class="nav-item" data-tab="alerts" onclick="go('alerts')"><div class="nav-icon-pill">⚡<span class="nav-badge" id="tb-alerts" style="display:none"></span></div><div class="nav-label">Cảnh báo</div></button>
    <button class="nav-item" data-tab="more" onclick="go('more')"><div class="nav-icon-pill">⋯</div><div class="nav-label">Thêm</div></button>
  </div>

  <!-- Dialog -->
  <div class="dialog-ov" id="dlg-ov" onclick="if(event.target===this)hideDlg()">
    <div class="dialog" id="dlg"></div>
  </div>

  <!-- Snackbar -->
  <div class="snack" id="snack" style="display:none">
    <span id="snack-msg"></span>
    <button class="snack-action" onclick="document.getElementById('snack').style.display='none'">OK</button>
  </div>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/helpers.js"></script>
<script src="assets/js/state.js"></script>
<script src="assets/js/detection.js"></script>
<script src="assets/js/android.js"></script>
</body>
</html>
