<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>KidShield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/common.css">
<link rel="stylesheet" href="assets/css/ios.css">
</head>
<body data-platform="ios">

<div id="app">
  <!-- Status Bar -->
  <div class="statusbar">
    <span class="sb-time" id="sb-time">9:41</span>
    <span class="sb-ic">●●● 📶 100</span>
  </div>

  <!-- Pages -->
  <div id="p-home" class="page on"></div>
  <div id="p-devices" class="page"></div>
  <div id="p-alerts" class="page"></div>
  <div id="p-more" class="page"></div>
  <div id="p-apps" class="page"></div>
  <div id="p-schedule" class="page"></div>
  <div id="p-ai" class="page"></div>
  <div id="p-rewards" class="page"></div>
  <div id="p-geo" class="page"></div>
  <div id="p-reports" class="page"></div>
  <div id="p-notify" class="page"></div>
  <div id="p-link" class="page"></div>
  <div id="p-settings" class="page"></div>

  <!-- SOS Button -->
  <button class="sos" onclick="doSOS()">🆘</button>

  <!-- Tab Bar -->
  <div class="tabbar">
    <button class="tab on" data-tab="home" onclick="go('home')"><div class="tab-ic">⬡</div><div class="tab-lbl">Tổng quan</div></button>
    <button class="tab" data-tab="devices" onclick="go('devices')"><div class="tab-ic">📡</div><div class="tab-lbl">Thiết bị</div></button>
    <button class="tab" data-tab="alerts" onclick="go('alerts')"><div class="tab-ic">⚡<span class="tab-bdg" id="tb-alerts" style="display:none"></span></div><div class="tab-lbl">Cảnh báo</div></button>
    <button class="tab" data-tab="more" onclick="go('more')"><div class="tab-ic">⋯</div><div class="tab-lbl">Thêm</div></button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Bottom Sheet -->
  <div class="sheet-ov" id="sheet-ov" onclick="if(event.target===this)hideSheet()">
    <div class="sheet">
      <div class="sheet-grip"></div>
      <div class="sheet-content" id="sheet-content"></div>
    </div>
  </div>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/helpers.js"></script>
<script src="assets/js/state.js"></script>
<script src="assets/js/detection.js"></script>
<script src="assets/js/ios.js"></script>
</body>
</html>
