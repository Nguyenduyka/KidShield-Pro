<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KidShield Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#030610;color:#f0f4ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{text-align:center;max-width:340px}
.logo{width:84px;height:84px;border-radius:24px;background:linear-gradient(135deg,#5b6ef5,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 20px;box-shadow:0 0 60px rgba(91,110,245,0.5);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(91,110,245,0.5)}50%{transform:scale(1.05);box-shadow:0 0 80px rgba(91,110,245,0.7)}}
h1{font-size:26px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px}
p{color:#8892a4;font-size:14px;line-height:1.5;margin-bottom:18px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#10d98a;margin:0 3px;animation:b 1.4s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes b{0%,80%,100%{opacity:.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
.platform{font-family:monospace;font-size:12px;color:#a5b4fc;background:rgba(91,110,245,0.1);border:1px solid rgba(91,110,245,0.3);border-radius:100px;padding:5px 14px;display:inline-block;margin-top:8px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🛡️</div>
  <h1>KidShield Pro</h1>
  <p>Đang phát hiện thiết bị<span class="dot"></span><span class="dot"></span><span class="dot"></span></p>
  <div class="platform" id="dp">detecting...</div>
</div>

<script>
(function() {
  function detectPlatform() {
    var ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/i.test(ua)) return "ios";
    if (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1) return "ios";
    if (/Android/i.test(ua)) return "android";
    if (window.innerWidth <= 768 && ("ontouchstart" in window || navigator.maxTouchPoints > 0)) return "android";
    return "desktop";
  }
  var p = detectPlatform();
  var labels = { ios: "📱 iPhone · iOS", android: "🤖 Android · Material 3", desktop: "💻 Desktop · Web" };
  document.getElementById("dp").textContent = labels[p];
  setTimeout(function() {
    location.replace(p + ".html");
  }, 400);
})();
</script>
</body>
</html>
