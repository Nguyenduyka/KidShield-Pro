    if (bar) bar.style.width = (remain / (2 * 60 * 1000) * 100) + "%";
  }, 1000);
}

// Simple QR code generator (no external library — uses Reed-Solomon Error Correction manually)
// Uses 21x21 grid (Version 1) for short payloads
function renderQR(text, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;

  // Use Google Charts QR API as fallback — works on file:// too via image
  // BUT to keep fully offline, draw a stylized "pseudo-QR" representation
  // using a hash-based pattern that LOOKS like a QR but is just visual
  const size = 21;
  const cellSize = 8;

  // Generate deterministic pattern from text
  const hash = simpleHash(text);
  const grid = generateQRPattern(text, size, hash);

  let svg = `<svg width="${size * cellSize}" height="${size * cellSize}" xmlns="http://www.w3.org/2000/svg" style="display:block">`;
  svg += `<rect width="100%" height="100%" fill="white"/>`;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if (grid[y][x]) {
        svg += `<rect x="${x * cellSize}" y="${y * cellSize}" width="${cellSize}" height="${cellSize}" fill="black"/>`;
      }
    }
  }
  svg += `</svg>`;
  container.innerHTML = svg;
}

function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function generateQRPattern(text, size, seed) {
  const grid = Array(size).fill(0).map(() => Array(size).fill(0));

  // Three finder patterns (corners) — standard QR
  function drawFinder(gx, gy) {
    for (let dy = 0; dy < 7; dy++) {
      for (let dx = 0; dx < 7; dx++) {
        const edge = (dx === 0 || dx === 6 || dy === 0 || dy === 6);
        const innerSq = (dx >= 2 && dx <= 4 && dy >= 2 && dy <= 4);
        grid[gy + dy][gx + dx] = edge || innerSq ? 1 : 0;
      }
    }
  }
  drawFinder(0, 0);
  drawFinder(size - 7, 0);
  drawFinder(0, size - 7);

  // Timing patterns
  for (let i = 8; i < size - 8; i++) {
    grid[6][i] = i % 2 === 0 ? 1 : 0;
    grid[i][6] = i % 2 === 0 ? 1 : 0;
  }

  // Random data pattern derived from text hash — deterministic
  let s = seed;
  function rand() {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    return s / 0x7fffffff;
  }

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      // Skip finder pattern areas (8x8 with 1px margin)
      const inFinder = (x < 8 && y < 8) || (x >= size - 8 && y < 8) || (x < 8 && y >= size - 8);
      // Skip timing patterns
      const inTiming = x === 6 || y === 6;
      if (inFinder || inTiming) continue;
      grid[y][x] = rand() > 0.5 ? 1 : 0;
    }
  }
  return grid;
}

function copyPairCode(code) {
  try {
    navigator.clipboard.writeText(code);
    toast("📋 Đã sao chép: " + code, "success");
  } catch (e) {
    // Fallback for non-https contexts
    const ta = document.createElement("textarea");
    ta.value = code;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); toast("📋 Đã sao chép: " + code, "success"); } catch {}
    document.body.removeChild(ta);
  }
}

function showMyDeviceQR() {
  const os = detectOS();
  // Đoán icon theo OS
  let icon = "📱";
  if (/Windows|macOS|Linux/.test(os)) icon = "💻";
  if (/iPadOS/.test(os)) icon = "📱";
  // Tên gợi ý theo thiết bị
  const guessName = /iPhone/.test(navigator.userAgent) ? "iPhone"
    : /iPad/.test(navigator.userAgent) ? "iPad"
    : /Android/.test(navigator.userAgent) ? "Android"
    : /Windows/.test(navigator.userAgent) ? "Windows PC"
    : /Mac/.test(navigator.userAgent) ? "Mac"
    : "Thiết bị";

  const payload = { t: "kidshield-device", name: guessName, os, icon };
  const json = JSON.stringify(payload);
  // Deep-link dạng base64 để QR gọn + quét chắc chắn
  const b64 = btoa(unescape(encodeURIComponent(json)));
  const base = (location.origin && location.origin !== "null")
    ? location.origin + location.pathname
    : "https://kidshield.app/";
  const devUrl = `${base}?dev=${b64}`;

  openModal(`
    <div style="text-align:center">
      <div class="modal-title">📲 Mã QR thiết bị này</div>
      <div class="modal-desc">Đưa màn hình này cho bố mẹ quét bằng nút <strong>"Quét mã của con"</strong> trên máy của họ.</div>

        <div id="dev-qr-container"></div>
      </div>

      <div style="background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(168,85,247,0.05));border:1px solid rgba(99,102,241,0.2);border-radius:14px;padding:14px;margin-bottom:14px;text-align:left">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:26px">${icon}</span>
          <div>
            <div style="font-weight:800;font-size:14px">${guessName}</div>
            <div style="font-size:11.5px;color:var(--text-2);font-family:var(--font-mono)">${os}</div>
          </div>
        </div>
      </div>

      <button class="btn ghost full" onclick="closeModal()">Đóng</button>
    </div>
  `);
  setTimeout(() => renderQR(devUrl, 'dev-qr-container'), 50);
}

      <div class="modal-desc">Hướng camera vào mã QR đang hiển thị trên thiết bị của con (mục "Hiện mã QR thiết bị").</div>

      <div style="position:relative;width:100%;max-width:320px;margin:0 auto 14px;aspect-ratio:1;border-radius:18px;overflow:hidden;background:#000;box-shadow:var(--shadow-lg)">
        <video id="scan-video" playsinline muted style="width:100%;height:100%;object-fit:cover"></video>
        <!-- khung ngắm -->
        <div style="position:absolute;inset:0;pointer-events:none">
          <div style="position:absolute;inset:14%;border:3px solid rgba(255,255,255,0.9);border-radius:18px;box-shadow:0 0 0 999px rgba(0,0,0,0.35)"></div>
          <div id="scan-line" style="position:absolute;left:14%;right:14%;top:14%;height:3px;background:linear-gradient(90deg,transparent,#8b5cf6,transparent);box-shadow:0 0 10px #8b5cf6;animation:scanmove 2s ease-in-out infinite"></div>
        </div>
      </div>

      <div id="scan-status" style="font-size:12.5px;color:var(--text-2);margin-bottom:14px;min-height:18px">Đang khởi động camera…</div>

      <div style="display:flex;gap:8px">
        <button class="btn ghost full" onclick="stopQRScanner();closeModal()">Huỷ</button>
        <button class="btn ghost full" onclick="stopQRScanner();enterCodeManually()">⌨️ Nhập mã tay</button>
      </div>
    </div>
    <style>@keyframes scanmove{0%,100%{top:14%}50%{top:83%}}</style>
  `);

  const statusEl = () => document.getElementById("scan-status");
  const video = document.getElementById("scan-video");

  // Kiểm tra hỗ trợ camera
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    if (statusEl()) statusEl().innerHTML = "⚠️ Trình duyệt không hỗ trợ camera. Hãy nhập mã thủ công.";
    return;
  }

  try {
    _scanStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }  // camera sau
    });
    video.srcObject = _scanStream;
    await video.play();
    if (statusEl()) statusEl().innerHTML = '<span class="online-dot"></span> Đang tìm mã QR…';
  } catch (e) {
    if (statusEl()) {
      const msg = e.name === "NotAllowedError"
        ? "⚠️ Bạn đã từ chối quyền camera. Hãy cấp quyền hoặc nhập mã tay."
        : "⚠️ Không mở được camera. Hãy nhập mã thủ công.";
      statusEl().innerHTML = msg;
    }
    return;
  }

  // Dùng BarcodeDetector nếu có
  if ("BarcodeDetector" in window) {
    try {
      _scanDetector = new window.BarcodeDetector({ formats: ["qr_code"] });
      scanLoop(video);
    } catch (e) {
      if (statusEl()) statusEl().innerHTML = "⚠️ Không khởi tạo được bộ quét. Hãy nhập mã tay.";
    }
  } else {
    // Trình duyệt cũ (Safari iOS dưới 17): không có BarcodeDetector
    if (statusEl()) statusEl().innerHTML = "ℹ️ Thiết bị không hỗ trợ quét tự động. Vui lòng bấm 'Nhập mã tay'.";
  }
}

async function scanLoop(video) {
  if (!_scanDetector || !_scanStream) return;
  try {
    const codes = await _scanDetector.detect(video);
    if (codes && codes.length) {
      const raw = codes[0].rawValue || "";
      handleScannedValue(raw);
      return; // dừng loop sau khi bắt được
    }
  } catch (e) { /* bỏ qua khung lỗi */ }
  _scanRAF = requestAnimationFrame(() => scanLoop(video));
}

// Xử lý giá trị quét được.
// Hỗ trợ 2 dạng QR:
//  (1) QR ĐỊNH DANH THIẾT BỊ (chuẩn mới): JSON {t:"kidshield-device", name, os, icon}
//      hoặc deep-link ?dev=<base64 json>  → bố mẹ quét máy con để thêm thẳng vào
//  (2) Mã ghép nối KS-XXXX (chiều cũ) → vẫn nhận để tương thích
function handleScannedValue(raw) {
  const val = (raw || "").trim();
  stopQRScanner();

  // --- Dạng (1a): JSON định danh thiết bị ---
  const dev = tryParseDevicePayload(val);
  if (dev) {
    closeModal();
    toast("✅ Đã đọc thông tin thiết bị của con!", "success");
    setTimeout(() => openDeviceRegistration(null, dev), 250);
    return;
  }

  // --- Dạng (2): mã ghép nối KS-XXXX (deep-link ?pair= hoặc mã thuần) ---
  let code = val;
  try {
    if (/^https?:\/\//i.test(code) || code.includes("?pair=")) {
      const u = new URL(code, location.href);
      const p = u.searchParams.get("pair");
      if (p) code = p;
    }
  } catch (e) {}
  code = code.toUpperCase();

  if (state.activePairCode && code === state.activePairCode && Date.now() <= state.activePairCodeExpiry) {
    closeModal();
    toast("✅ Quét mã thành công!", "success");
    setTimeout(() => openDeviceRegistration(code), 250);
    return;
  }

  // Không khớp dạng nào
  closeModal();
  toast("❌ Mã QR không hợp lệ hoặc đã hết hạn", "danger");
}

// Đọc payload định danh thiết bị từ QR của máy con
function tryParseDevicePayload(val) {
  // Dạng deep-link ?dev=<base64>
  try {
    if (val.includes("?dev=") || /^https?:\/\//i.test(val)) {
      const u = new URL(val, location.href);
      const d = u.searchParams.get("dev");
      if (d) {
        const obj = JSON.parse(decodeURIComponent(escape(atob(d))));
        if (obj && obj.t === "kidshield-device") return obj;
      }
    }
  } catch (e) {}
  // Dạng JSON thuần
  try {
    const obj = JSON.parse(val);
    if (obj && obj.t === "kidshield-device") return obj;
  } catch (e) {}
  return null;
}

function stopQRScanner() {
  if (_scanRAF) { cancelAnimationFrame(_scanRAF); _scanRAF = null; }
  _scanDetector = null;
  if (_scanStream) {
    _scanStream.getTracks().forEach(t => t.stop());
    _scanStream = null;
  }
}

// Simulate device scanning the QR → opens registration flow on the "new device"
function simulateScan(code) {
  if (state.activePairCode !== code) {
    toast("❌ Mã không hợp lệ", "danger");
    return;
  }
  if (Date.now() > state.activePairCodeExpiry) {
    toast("⏱ Mã đã hết hạn", "warning");
    return;
  }
  clearInterval(_pairTimer);
  closeModal();
  setTimeout(() => openDeviceRegistration(code), 250);
}

function detectOS() {
  const ua = navigator.userAgent;
  if (/iPhone OS (\d+)/i.test(ua)) return "iOS " + RegExp.$1;
  if (/iPad.*OS (\d+)/i.test(ua)) return "iPadOS " + RegExp.$1;
  if (/Android (\d+)/i.test(ua)) return "Android " + RegExp.$1;
  if (/Mac OS X (\d+[._]\d+)/.test(ua)) return "macOS";
  if (/Windows NT/.test(ua)) return "Windows 11";
  if (/Linux/.test(ua)) return "Linux";
  return "Unknown";
}

    id: "d" + Date.now(),
    name,
    icon: selectedDeviceIcon,
    os,
    online: true,
    battery: 100,
    currentApp: null,
    appRisk: null,
    screenTime: 0,
    limitMins: limit,
  };

  c.devices.push(newDevice);
  state.activePairCode = null;
  window._scannedDevice = null;
  selectedDeviceIcon = "📱"; // reset
  closeModal();
  saveState();
  toast(`✅ Đã thêm ${name} cho ${c.name}`, "success");
  showNotif(`📱 Thiết bị mới "${name}" đã kết nối`, "low");
  render();
}

    { color: "#6366f1", label: "Indigo" },
    { color: "#ec4899", label: "Hồng" },
    { color: "#f59e0b", label: "Cam" },
    { color: "#10b981", label: "Xanh lá" },
    { color: "#06b6d4", label: "Cyan" },
    { color: "#a855f7", label: "Tím" },
    { color: "#f43f5e", label: "Đỏ" },
    { color: "#fb923c", label: "Cam đậm" },
  ];
  selectedAvatar = c.avatar;
  selectedColor = c.color;

  openModal(`
    <div class="modal-title">✏️ Chỉnh sửa thông tin</div>
    <div class="modal-desc">Đổi tên, avatar, hoặc màu của ${c.avatar} <strong>${c.name}</strong></div>

    <div style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label style="font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:6px">Tên</label>
        <input class="input" id="edit-child-name" value="${c.name}" autofocus>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label style="font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:6px">Tuổi</label>

        </div>
        <div>
          <label style="font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:6px">Tâm trạng</label>

        </div>
      </div>

      <div>
        <label style="font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:6px">Avatar</label>
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px">

            <button class="avatar-btn ${av === c.avatar ? 'active' : ''}" onclick="selectAvatar(this,'${av}')" style="display:flex;align-items:center;justify-content:center;padding:10px;background:var(--surface);border:2px solid var(--border);border-radius:12px;font-size:24px;transition:all 0.2s var(--ease)">${av}</button>

          ${palette.map(p => `
            <button class="color-btn ${p.color === c.color ? 'active' : ''}" onclick="selectColor(this,'${p.color}')" title="${p.label}" style="aspect-ratio:1;background:${p.color};border:3px solid ${p.color === c.color ? 'white' : 'transparent'};border-radius:12px;transition:all 0.2s var(--ease)"></button>

      </div>

      <button class="btn danger" onclick="confirmDeleteChild(${childId})" title="Xoá bé">🗑️</button>
      <button class="btn ghost full" onclick="closeModal()">Huỷ</button>
      <button class="btn primary full" onclick="confirmEditChild(${childId})">✓ Lưu</button>

      .avatar-btn.active { background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(168,85,247,0.1)) !important; border-color:var(--indigo) !important; transform:scale(1.05); }

function confirmEditChild(childId) {
  const c = getChild(childId);
  if (!c) return;
  const newName = document.getElementById("edit-child-name").value.trim();
  const newAge = parseInt(document.getElementById("edit-child-age").value) || c.age;
  const newMood = document.getElementById("edit-child-mood").value.trim() || c.mood;

  if (!newName) { toast("⚠️ Tên không được để trống", "warning"); return; }

  const oldName = c.name;
  c.name = newName;
  c.age = newAge;
  c.mood = newMood;
  c.avatar = selectedAvatar;
  c.color = selectedColor;
  selectedAvatar = "👦";
  selectedColor = "#6366f1";

  saveState();
  closeModal();
  toast(`✏️ Đã cập nhật: ${oldName !== newName ? `${oldName} → ${newName}` : newName}`, "success");
  render();
}

function confirmDeleteChild(childId) {
  const c = getChild(childId);
  if (!c) return;

  // Replace native confirm with pretty modal
  openModal(`
    <div style="text-align:center;padding:8px 0 4px">
      <div style="font-size:64px;margin-bottom:14px;animation:bootBounce 2s var(--ease-spring) infinite">⚠️</div>
    </div>
    <div class="modal-title" style="background:linear-gradient(135deg,#f43f5e,#ec4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-align:center">Xác nhận xoá bé</div>
    <div class="modal-desc" style="text-align:center">
      Bạn sắp xoá <strong>${c.avatar} ${c.name}</strong> và <strong>${c.devices.length} thiết bị</strong> liên quan.<br>
      Hành động này <strong style="color:var(--rose)">không thể hoàn tác</strong>.
    </div>

    <div style="background:linear-gradient(135deg,rgba(244,63,94,0.06),rgba(236,72,153,0.04));border:1px solid rgba(244,63,94,0.2);border-radius:14px;padding:14px;margin-bottom:18px">
      <div style="font-size:11px;font-weight:700;color:var(--rose);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px">⚠️ Dữ liệu sẽ bị xoá:</div>
      <div style="font-size:12.5px;color:var(--text-2);line-height:1.7">
        • Tất cả ${c.devices.length} thiết bị đã liên kết<br>
        • ${state.rewardPoints[childId] || 0} điểm thưởng đã tích<br>
        • Lịch sử dụng, huy hiệu, vị trí GPS<br>
        • Tất cả cảnh báo liên quan
      </div>
    </div>

    <div style="display:flex;gap:8px">
      <button class="btn ghost full" onclick="closeModal()">Huỷ</button>
      <button class="btn danger full" onclick="reallyDeleteChild(${childId})">🗑️ Xoá vĩnh viễn</button>
    </div>
  `);
}

function reallyDeleteChild(childId) {
  const c = getChild(childId);
  if (!c) return;
  const name = c.name;

  state.children = state.children.filter(x => x.id !== childId);
  delete state.rewardPoints[childId];
  delete ACHIEVEMENTS[childId];
  delete SCHEDULES[childId];
  delete WEEK_DATA[childId];
  delete LOCATIONS[childId];
  // Also remove alerts referencing this child
  state.alerts = state.alerts.filter(a => a.childId !== childId);
  // Reset schedule selection if it was this child
  if (state.scheduleChildId === childId) {
    state.scheduleChildId = state.children[0]?.id || 1;
  }

  saveState();
  closeModal();
  toast(`🗑️ Đã xoá bé ${name}`, "warning");
  render();
}

        return `
        <div class="card">
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
            <div class="avatar" style="background:linear-gradient(135deg,${c.color}33,${c.color}66);color:${c.color};width:52px;height:52px;font-size:26px">${c.avatar}</div>
            <div style="flex:1">

                <span style="font-size:17px">${f.icon}</span>
                <span style="flex:1;font-size:12.5px;color:var(--text-1)">${f.text}</span>

    <div class="card" style="margin-top:14px;background:linear-gradient(135deg,rgba(139,92,246,0.06),rgba(59,130,246,0.04))">

      <div style="font-size:12.5px;color:var(--text-2);line-height:1.7">
        Điểm bắt đầu từ 100, điều chỉnh theo: mức độ <strong>tuân thủ giới hạn màn hình</strong>, số <strong>app rủi ro cao</strong> đang dùng, <strong>cảnh báo nghiêm trọng</strong> gần đây, và <strong>điểm thưởng</strong> (hành vi tích cực). Đây là chỉ báo tham khảo để hỗ trợ trò chuyện, không thay thế quan sát của phụ huynh.

function askAIAboutChild(childId) {
  const c = getChild(childId);
  if (!c) return;
  state.currentTab = "ai";
  state.aiTab = "chat";
  render();
  setTimeout(() => sendAI(`Hãy phân tích sức khoẻ số của ${c.name} (${c.age} tuổi) và cho tôi 3 lời khuyên cụ thể để cải thiện thói quen dùng thiết bị.`), 200);
}

async function generateWeeklySummary() {
  state.currentTab = "ai";
  state.aiTab = "chat";
  render();
  setTimeout(() => sendAI("Hãy tạo bản tóm tắt tuần về việc sử dụng thiết bị của các con tôi, nêu điểm tích cực và điều cần lưu ý, viết ngắn gọn để tôi dùng làm chủ đề trò chuyện với con."), 200);
}

  const active = activeFocusMode();

        <div class="page-sub">Routines · chỉ cho phép một số app theo khung giờ</div>
      </div>
    </div>

    ${active ? `
      <div class="hero ok" style="background:linear-gradient(135deg,${active.color},${active.color}cc)">
        <div class="hero-decor">${active.icon}</div>
        <div class="hero-eyebrow">Đang bật</div>
        <div class="hero-title">${active.name}</div>
        <div class="hero-sub">${active.from}–${active.to} · ${active.allow.length ? "Cho phép: " + active.allow.join(", ") : "Khoá toàn bộ app"}${active.grayscale ? " · Màn hình xám" : ""}</div>
      </div>
    ` : `
      <div class="card" style="margin-bottom:14px;text-align:center;padding:24px">
        <div style="font-size:40px;margin-bottom:8px">🎯</div>
        <div style="font-weight:700;font-size:15px;margin-bottom:4px">Chưa bật chế độ nào</div>
        <div style="font-size:12.5px;color:var(--text-2)">Bật một chế độ để giới hạn app theo mục đích & khung giờ</div>
      </div>
    `}

    <div class="grid-2">
      ${FOCUS_MODES.map(m => `
        <div class="card" style="${m.active ? `border:2px solid ${m.color}66;background:linear-gradient(135deg,${m.color}11,transparent)` : ""}">
          <div style="display:flex;align-items:center;gap:13px;margin-bottom:14px">
            <div style="width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;background:linear-gradient(135deg,${m.color}33,${m.color}66);box-shadow:0 4px 12px ${m.color}33">${m.icon}</div>
            <div style="flex:1">
              <div style="font-weight:800;font-size:15px">${m.name}</div>
              <div style="font-size:11.5px;color:var(--text-2);font-family:var(--font-mono)">${m.from} – ${m.to}</div>
            </div>
            <div class="toggle ${m.active ? 'on' : ''}" onclick="toggleFocusMode('${m.id}')"></div>
          </div>

          <div style="font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px">App được phép</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
            ${m.allow.length ? m.allow.map(a => `<span class="chip safe">${a}</span>`).join("") : `<span class="chip high">🔒 Khoá toàn bộ</span>`}
          </div>

          ${m.grayscale ? `<div style="display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--text-2);padding:8px 10px;background:var(--glass);border-radius:10px"><span>🌑</span> Tự chuyển màn hình sang xám</div>` : ""}
        </div>
      `).join("")}
    </div>

    <div class="card" style="margin-top:14px;background:linear-gradient(135deg,rgba(20,184,166,0.06),rgba(59,130,246,0.04))">
      <div class="card-title">💡 Chế độ tập trung là gì?</div>
      <div style="font-size:12.5px;color:var(--text-2);line-height:1.7">
        Lấy cảm hứng từ Google Digital Wellbeing. Trong khung giờ đã đặt, thiết bị của trẻ <strong>chỉ chạy được nhóm app được phép</strong> (vd: Giờ học chỉ cho Giáo dục). Giờ ngủ có thể khoá toàn bộ và chuyển <strong>màn hình sang xám</strong> để giảm hấp dẫn. Giúp xây thói quen thay vì chỉ cấm đoán.
      </div>
    </div>
  `;
}

function toggleFocusMode(id) {
  const m = FOCUS_MODES.find(x => x.id === id);
  if (!m) return;
  if (!m.active) {
    // Bật mode này, tắt các mode khác (chỉ 1 active tại một thời điểm)
    FOCUS_MODES.forEach(x => x.active = false);
    m.active = true;
    toast(`🎯 Đã bật "${m.name}"${m.grayscale ? " · màn hình xám" : ""}`, "success");
    showNotif(`🎯 Chế độ "${m.name}" đang áp dụng cho tất cả thiết bị`, "low");
  } else {
    m.active = false;
    toast(`Đã tắt "${m.name}"`, "warning");
  }
  saveState();
  render();
}

      <div class="card-title">💡 Vì sao nên cho con xin phép?</div>
      <div style="font-size:12.5px;color:var(--text-2);line-height:1.7">
        Thay vì chặn cứng gây ấm ức, cho phép con <strong>giải thích lý do</strong> giúp xây dựng lòng tin và dạy con tự đánh giá. Bạn có thể duyệt tạm thời (30 phút) hoặc duyệt hẳn — mọi quyết định đều mở ra một cuộc trò chuyện.
      </div>
    </div>
  `;
}

function approveRequest(id, minutes) {
  const r = ACCESS_REQUESTS.find(x => x.id === id);
  if (!r) return;
  r.status = "approved";
  const c = getChild(r.childId);
  // Mở khoá app tương ứng nếu đang khoá
  const app = APPS.find(a => a.name === r.target);
  if (app) state.lockedApps.delete(app.id);
  const dur = minutes ? ` trong ${minutes} phút` : " (vĩnh viễn)";
  toast(`✓ Đã duyệt ${r.target} cho ${c ? c.name : "con"}${dur}`, "success");
  showNotif(`✅ Đã mở "${r.target}" cho ${c ? c.name : "con"}${dur}`, "low");
  saveState();
  render();
}

function denyRequest(id) {
  const r = ACCESS_REQUESTS.find(x => x.id === id);
  if (!r) return;
  r.status = "denied";
  const c = getChild(r.childId);
  toast(`✕ Đã từ chối yêu cầu của ${c ? c.name : "con"}`, "warning");
  saveState();
  render();
}

function simulateChildRequest() {
  if (!state.children.length) { toast("Chưa có bé nào", "warning"); return; }
  const samples = [
    { type: "app", target: "YouTube", reason: "Con muốn xem video học tiếng Anh ạ" },
    { type: "web", target: "wikipedia.org", reason: "Con cần tra cứu cho bài tập lịch sử" },
    { type: "app", target: "Roblox", reason: "Bạn con rủ chơi cùng 30 phút thôi ạ" },
    { type: "app", target: "Messenger", reason: "Con cần nhắn nhóm làm bài tập" },
  ];
  const s = samples[Math.floor(Math.random() * samples.length)];
  const c = state.children[Math.floor(Math.random() * state.children.length)];
  ACCESS_REQUESTS.unshift({
    id: "r" + Date.now(),
    childId: c.id,
    type: s.type,
    target: s.target,
    reason: s.reason,
    time: now(),
    status: "pending",
  });
  toast(`🙋 ${c.name} vừa gửi yêu cầu mới`, "success");
  showNotif(`🙋 ${c.name} xin mở "${s.target}"`, "medium");
  saveState();
  render();
}

function addKeyword() {

    saveState();
    toast(`🚫 Thêm: ${k}`, "warning");
    render();
  }
  inp.value = "";
}

function editLimit(id) {
  const c = getChild(id);
  const l = prompt(`Giới hạn (phút) cho ${c.name}:`, c.devices[0]?.limitMins || 120);

    c.devices.forEach(d => d.limitMins = parseInt(l) || 120);
    toast("✅ Cập nhật", "success");
    saveState();
    render();
  }
}

function exportConfig() {
  const d = { lockedApps: [...state.lockedApps], scriptUrl: state.scriptUrl, admins: state.admins, blockedKeywords: state.blockedKeywords, rewardPoints: state.rewardPoints };

  const a = document.createElement("a");
  a.href = URL.createObjectURL(b);
  a.download = "kidshield-config.json";
  a.click();
  toast("📥 Đã xuất cấu hình", "success");
}

// ═════════════════════════════════════════════════════════════
//  AUTO DETECTION (background)
// ═════════════════════════════════════════════════════════════
const COOLDOWN = {};
const COOLDOWN_MS = 5 * 60 * 1000;

function runAutoDetect() {
  if (!state.autoDetect) return;
  state.children.forEach(c => {
    c.devices.forEach(d => {
      if (d.currentApp && d.online) {
        const app = APPS.find(a => a.name === d.currentApp);
        if (app && app.risk === "high" && !COOLDOWN[`${d.id}-hi`]) {
          COOLDOWN[`${d.id}-hi`] = Date.now();
          setTimeout(() => delete COOLDOWN[`${d.id}-hi`], COOLDOWN_MS);
          showNotif(`${c.name} đang dùng ${d.currentApp} (rủi ro cao)`, "high");
        }
      }
      if (d.screenTime > d.limitMins && !COOLDOWN[`${d.id}-ov`]) {
        COOLDOWN[`${d.id}-ov`] = Date.now();
        setTimeout(() => delete COOLDOWN[`${d.id}-ov`], COOLDOWN_MS);
      }
    });
  });
}

// ═════════════════════════════════════════════════════════════
//  LIVE SIMULATION
// ═════════════════════════════════════════════════════════════
function liveTick() {
  state.children.forEach(c => {
    c.devices.forEach(d => {
      if (d.online && d.screenTime < d.limitMins + 90) d.screenTime += 1;
      if (d.battery !== null && d.battery > 1 && Math.random() > 0.93) d.battery = Math.max(1, d.battery - 1);
    });
  });
  if (state.currentTab === "dashboard" || state.currentTab === "devices") {
    render();
  }
  saveState();
}

// ═════════════════════════════════════════════════════════════
//  INIT
// ═════════════════════════════════════════════════════════════
function hideBoot() {
  const b = document.getElementById("boot");
  if (b) {
    b.classList.add("gone");
    setTimeout(() => b.remove(), 500);
  }
}

async function boot() {
  initFirebase();

  if (!FIREBASE_READY) {
    // Firebase not configured/loaded — show auth screen with the error.
    hideBoot();
    showAuthScreen();
    return;
  }

  const fb = window.__fb;
  let resolved = false;
  // onAuthStateChanged fires once on load with the restored session (or null)
  fb.onAuthStateChanged(fbAuth, async (user) => {
    if (user) {
      authState.currentUser = mapFirebaseUser(user);
      await loadState();
      hideBoot();
      showApp();
    } else {
      // Signed out (or no session).
      if (resolved) {
        authState.currentUser = null;
        clearStateForLogout();
      }
      hideBoot();
      showAuthScreen();
    }
    resolved = true;
  });
}

// Firebase SDK loads as a module — wait for it to be ready before booting.
if (window.__fb) {
  boot();
} else {
  window.addEventListener("firebase-ready", boot, { once: true });
  // Safety: if the SDK never loads (offline / opened via file://), still boot
  // so the auth screen can show the configuration error.
  setTimeout(() => { if (!FIREBASE_READY && !window.__fb) boot(); }, 2500);
}

// Background loops (only run when state is loaded)
setInterval(() => { if (authState.currentUser) liveTick(); }, 15000);
setInterval(() => { if (authState.currentUser) runAutoDetect(); }, 30000);
</script>
