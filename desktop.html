<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KidShield Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/common.css">
<link rel="stylesheet" href="assets/css/desktop.css">
</head>
<body data-platform="desktop">

<!-- Sidebar -->
<div id="sb">
  <div class="sb-tog" id="sb-tog" onclick="toggleSB()">▶</div>
  <div class="sb-logo">
    <div class="sb-gem">🛡️</div>
    <div class="sb-txt">KidShield<span class="sb-ver">v3.0</span></div>
  </div>

  <button class="nav on" id="nav-dashboard" onclick="go('dashboard')"><span class="ni">⬡</span><span class="nl">Tổng quan</span></button>
  <button class="nav" id="nav-devices" onclick="go('devices')"><span class="ni">📡</span><span class="nl">Thiết bị</span><span class="nbdg nm" id="bdg-d"></span></button>
  <button class="nav" id="nav-apps" onclick="go('apps')"><span class="ni">◈</span><span class="nl">Ứng dụng</span><span class="nbdg nm" id="bdg-a"></span></button>
  <button class="nav" id="nav-alerts" onclick="go('alerts')"><span class="ni">⚡</span><span class="nl">Cảnh báo</span><span class="nbdg nr" id="bdg-al"></span></button>
  <button class="nav" id="nav-schedule" onclick="go('schedule')"><span class="ni">🗓️</span><span class="nl">Lịch sử dụng</span></button>
  <button class="nav" id="nav-ai" onclick="go('ai')"><span class="ni">✦</span><span class="nl">AI Phân tích</span></button>
  <button class="nav" id="nav-rewards" onclick="go('rewards')"><span class="ni">⭐</span><span class="nl">Phần thưởng</span></button>
  <button class="nav" id="nav-geo" onclick="go('geo')"><span class="ni">📍</span><span class="nl">Vị trí & Vùng</span></button>
  <button class="nav" id="nav-reports" onclick="go('reports')"><span class="ni">▣</span><span class="nl">Báo cáo tuần</span></button>
  <button class="nav" id="nav-notify" onclick="go('notify')"><span class="ni">🔔</span><span class="nl">Thông báo</span><span class="nbdg nr" id="bdg-n"></span></button>
  <button class="nav" id="nav-link" onclick="go('link')"><span class="ni">🔗</span><span class="nl">Liên kết</span></button>
  <button class="nav" id="nav-settings" onclick="go('settings')"><span class="ni">⚙</span><span class="nl">Cài đặt</span></button>

  <div class="sb-space"></div>
  <button class="sos-sb" onclick="doSOS()"><span class="ni" style="width:auto">🆘</span><span class="nl">SOS Khẩn Cấp</span></button>
</div>

<!-- Main content area -->
<div id="main">
  <div id="pg-dashboard"></div>
  <div id="pg-devices" style="display:none"></div>
  <div id="pg-apps" style="display:none"></div>
  <div id="pg-alerts" style="display:none"></div>
  <div id="pg-schedule" style="display:none"></div>
  <div id="pg-ai" style="display:none"></div>
  <div id="pg-rewards" style="display:none"></div>
  <div id="pg-geo" style="display:none"></div>
  <div id="pg-reports" style="display:none"></div>
  <div id="pg-notify" style="display:none"></div>
  <div id="pg-link" style="display:none"></div>
  <div id="pg-settings" style="display:none"></div>
</div>

<!-- SOS Float -->
<button class="sos-fl" onclick="doSOS()">🆘 SOS Khẩn Cấp</button>

<!-- Toast -->
<div id="toast"></div>

<!-- Phone Notification Preview -->
<div id="phov">
  <div class="ph-frame">
    <div class="ph-sb"><span style="font-size:11px;color:#fff;font-weight:600">●●●</span><div class="ph-notch"></div><span style="font-size:11px;color:#fff">9:41</span></div>
    <div class="ph-screen">
      <div class="ph-bigtime"><div class="t">9:41</div><div class="d">Thứ Hai, 18/05</div></div>
      <div id="phn"></div>
      <div class="ph-home"></div>
    </div>
  </div>
</div>

<!-- Scripts (order matters) -->
<script src="assets/js/data.js"></script>
<script src="assets/js/helpers.js"></script>
<script src="assets/js/state.js"></script>
<script src="assets/js/detection.js"></script>
<script src="assets/js/desktop.js"></script>
</body>
</html>
